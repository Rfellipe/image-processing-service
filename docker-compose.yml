name: image-processing-service

services:
  back:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ips-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/image_processing_service?schema=public
      PORT: 3030
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3030:3030'
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: ips-database
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: image_processing_service
    volumes:
      - ips_database_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ips_database_data:
